name: Release
on:
  push:
    tags:
      - 'v*.*.*'
permissions:
  contents: write
  packages: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Setup Packer
        uses: hashicorp/setup-packer@main
      - name: Run Acceptance Tests
        run: make testacc
        env:
          MGC_API_KEY: ${{ secrets.MGC_API_KEY }}
          MGC_ACCESS_KEY: ${{ secrets.MGC_ACCESS_KEY }}
          MGC_SECRET_KEY: ${{ secrets.MGC_SECRET_KEY }}
          BUCKET: ${{ secrets.BUCKET }}
          IMAGE_URL: ${{ secrets.IMAGE_URL }}
  release:
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      version: ${{ steps.describe_plugin.outputs.version }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Go Environment
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Describe Plugin
        id: describe_plugin
        run: |
          go run . describe >"$RUNNER_TEMP/info.json"
          echo "version=$(jq -r '.version' "$RUNNER_TEMP/info.json")" >>"$GITHUB_OUTPUT"
          echo "api_version=$(jq -r '.api_version' "$RUNNER_TEMP/info.json")" >>"$GITHUB_OUTPUT"
      - name: Import GPG Key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean --timeout 120m
        env:
          API_VERSION: ${{ steps.describe_plugin.outputs.api_version }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  notify:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Checkout integration-release-action
        uses: actions/checkout@v6
        with:
          repository: hashicorp/integration-release-action
          path: ./integration-release-action
      - name: Notify Release
        uses: ./integration-release-action
        with:
          integration_identifier: "packer/julianolf/magalucloud"
          release_version: ${{ needs.release.outputs.version }}
          release_sha: ${{ github.ref }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
